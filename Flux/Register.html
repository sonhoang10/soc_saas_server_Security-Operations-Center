<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux | Register User</title>
    <link rel="stylesheet" href="src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
  </head>
  <body class="bg-sbBg text-sbText antialiased">
    <nav class="border-b border-sbBorder sticky top-0 bg-sbBg/80 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="zap" class="text-sbTeal w-8 h-8"></i>
                <span onclick="window.location.href='index.html'" class="hover:cursor-pointer text-xl font-bold tracking-tight text-white uppercase">FLUX</span>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-sbSubText">
                <a href="#features" class="hover:text-sbTeal transition">Features</a>
                <a href="#solutions" class="hover:text-sbTeal transition">Solutions</a>
                <a href="#compliance" class="hover:text-sbTeal transition">Compliance</a>
                <a href="#pricing" class="hover:text-sbTeal transition">Pricing</a>
            </div>
        </div>
    </nav>
    <div class="min-h-screen bg-[#0a0a0a] flex items-center justify-center p-6 selection:bg-[#3ecf8e]/30 selection:text-[#3ecf8e]">
      <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-[#3ecf8e]/10 blur-[120px] rounded-full"></div>
      </div>

      <div class="relative w-full max-w-[480px] bg-[#111111]/80 backdrop-blur-xl border border-[#3e3e3e] rounded-2xl p-10 shadow-2xl shadow-black/50">
        <div class="flex flex-col items-center mb-8">
          <div class="w-12 h-12 bg-[#3ecf8e]/10 border border-[#3ecf8e]/30 rounded-xl flex items-center justify-center mb-4 group cursor-default">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:scale-110 transition-transform"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <h1 class="text-2xl font-bold text-white tracking-tight">Create Account</h1>
          <p class="text-sm text-[#a0a0a0] mt-1 text-center font-mono uppercase tracking-widest text-[10px]">Step 1: Personal Verification</p>
        </div>

        <form id="register-form" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-[#a0a0a0] uppercase tracking-wider mb-2" for="username">Full Name / Username</label>
            <input type="text" id="username" required placeholder="John Doe" class="w-full bg-[#1c1c1c] border border-[#3e3e3e] rounded-lg px-4 py-2.5 text-sm text-white placeholder:text-[#3e3e3e] focus:outline-none focus:border-[#3ecf8e] focus:ring-1 focus:ring-[#3ecf8e]/20 transition-all">
          </div>

          <div>
            <label class="block text-xs font-bold text-[#a0a0a0] uppercase tracking-wider mb-2" for="email">Email Address</label>
            <input type="email" id="email" required placeholder="john@gmail.com" class="w-full bg-[#1c1c1c] border border-[#3e3e3e] rounded-lg px-4 py-2.5 text-sm text-white placeholder:text-[#3e3e3e] focus:outline-none focus:border-[#3ecf8e] focus:ring-1 focus:ring-[#3ecf8e]/20 transition-all">
          </div>

          <div>
            <label class="block text-xs font-bold text-[#a0a0a0] uppercase tracking-wider mb-2" for="phone">Phone Number</label>
            <input type="tel" id="phone" required placeholder="+84 123 456 789" class="w-full bg-[#1c1c1c] border border-[#3e3e3e] rounded-lg px-4 py-2.5 text-sm text-white placeholder:text-[#3e3e3e] focus:outline-none focus:border-[#3ecf8e] focus:ring-1 focus:ring-[#3ecf8e]/20 transition-all">
          </div>

          <div>
            <label class="block text-xs font-bold text-[#a0a0a0] uppercase tracking-wider mb-2" for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••" class="w-full bg-[#1c1c1c] border border-[#3e3e3e] rounded-lg px-4 py-2.5 text-sm text-white placeholder:text-[#3e3e3e] focus:outline-none focus:border-[#3ecf8e] focus:ring-1 focus:ring-[#3ecf8e]/20 transition-all">
          </div>

          <button type="submit" class="w-full bg-[#3ecf8e] hover:bg-[#34b27a] text-black font-bold py-2.5 rounded-lg text-sm transition-all transform active:scale-[0.98] shadow-[0_0_20px_rgba(62,207,142,0.3)] mt-6">
            Register Account
          </button>

          <div class="text-center pt-2">
            <p class="text-[10px] text-[#a0a0a0] uppercase font-mono">
              Already have an account? <a href="SignIn.html" class="text-[#3ecf8e] hover:underline font-bold">Sign In</a>
            </p>
          </div>
        </form>
      </div>
    </div>
    <script> lucide.createIcons(); </script>
    <script>
      const backendURL = `http://${window.location.hostname}:8000`;

      document.addEventListener('DOMContentLoaded', () => {
          const registerForm = document.getElementById('register-form');
          
          if (!registerForm) {
              console.error("Không tìm thấy form! Hãy kiểm tra lại thẻ <form> xem có id='register-form' chưa.");
              return;
          }

          registerForm.addEventListener('submit', async (e) => {
              e.preventDefault();
              const username = document.getElementById('username').value;
              const email = document.getElementById('email').value;
              const phone = document.getElementById('phone').value;
              const password = document.getElementById('password').value;

              try {
                  const response = await axios.post(`${backendURL}/api/auth/register`, {
                      username: username,
                      email: email,
                      password: password,
                      phone: phone
                  });

                  alert(response.data.message || "Đăng ký thành công!");
                  window.location.href = '/SignIn.html';
              } catch (error) {
                  console.error("Chi tiết lỗi:", error);
                  const errorMsg = error.response?.data?.detail || error.message || "Lỗi kết nối đến máy chủ!";
                  alert("Đăng ký thất bại: " + errorMsg);
              }
          });
      });
    </script>
  </body>
</html>
